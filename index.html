<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Animation</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <div id="cake">

            <!-- Candle -->
            <div class="candle">
                <div class="flame"></div>
            </div>

            <!-- White Cream Layer -->
            <div class="icing">
                <div class="drip drip-left"></div>
                <div class="drip drip-middle"></div>
                <div class="drip drip-right"></div>
            </div>

            <!-- Chocolate Layers -->
            <div class="layer layer-top"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-bottom"></div>

            <!-- White Plate Line -->
            <div class="plate"></div>

        </div>

        <div class="message">
            <h1>Happy Birthday!</h1>
            <p>Bhaiyeee</p>
        </div>

    </div>

</body>
</html>
